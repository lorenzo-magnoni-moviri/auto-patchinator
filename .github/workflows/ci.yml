name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"   # matches pyproject.toml's requires-python floor
          cache: pip

      - name: Install
        run: pip install -e ".[test]"

      - name: Unit tests
        run: python -m pytest

      - name: Generate synthetic CI fixture Excel
        run: python scripts/gen_ci_fixture.py ci_fixture.xlsx

      - name: Dry-run plan resolution smoke test
        run: |
          echo n | auto-patchinator run \
            --excel ci_fixture.xlsx \
            --inventory inventory/hosts.example.yaml \
            --dry-run
